<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disca Zap — números viram link</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --bg: #14171A; --panel: #1D2227; --panel-2: #242A30; --line: #313A42;
    --text: #ECEFF1; --text-dim: #9AA5AC; --amber: #FFB627; --amber-dim: #8A6A22;
    --whats: #3DDC84; --bad: #FF6B5E; --site: #6FB7FF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{ background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; line-height: 1.5; min-height: 100vh; }
  ::selection{ background: var(--amber); color:#14171A; }
  .hidden{ display:none !important; }
  .wrap{ max-width: 880px; margin: 0 auto; padding: 32px 16px 80px; }

  /* ---- Logo ---- */
  .logo{ display:flex; align-items:center; gap:10px; margin-bottom: 28px; }
  .logo-icon{
    width:38px; height:38px; border-radius:10px;
    background: var(--amber); display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .logo-icon svg{ width:22px; height:22px; }
  .logo-wordmark{ display:flex; flex-direction:column; line-height:1.1; }
  .logo-wordmark span:first-child{
    font-family:'Archivo',sans-serif; font-weight:800; font-size:18px; letter-spacing:-0.02em; color:var(--text);
  }
  .logo-wordmark span:last-child{
    font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dim);
  }

  h1{ font-family: 'Archivo', sans-serif; font-weight: 800; font-size: clamp(24px, 5vw, 40px); line-height: 1.08; letter-spacing: -0.01em; margin: 10px 0 10px; }
  h1 span{ color: var(--whats); }

  .panel{ background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .panel-title{ font-family:'Archivo', sans-serif; font-weight:700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin: 0 0 12px; display:flex; align-items:center; justify-content:space-between; gap:10px; }

  textarea{ width:100%; min-height: 120px; background: var(--bg); border: 1px solid var(--line); border-radius: 8px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 13px; padding: 12px; resize: vertical; }
  
  /* ---- Drop Zone ---- */
  .drop-zone{
    border: 2px dashed var(--line); border-radius: 8px; padding: 20px;
    text-align:center; color:var(--text-dim); font-size:13px; cursor:pointer;
    transition: border-color .2s, background .2s; margin-top:10px;
  }
  .drop-zone:hover, .drop-zone.drag-over{ border-color:var(--amber); background:rgba(255,182,39,0.04); color:var(--text); }
  .drop-zone span{ display:block; font-size:24px; margin-bottom:4px; }

  .row{ display:flex; gap:12px; flex-wrap:wrap; margin-top: 14px; }
  .field{ flex: 1; min-width: 140px; }
  .field label{ display:block; font-size: 11.5px; color: var(--text-dim); margin-bottom: 5px; }
  .field input{ width:100%; background: var(--bg); border: 1px solid var(--line); border-radius: 6px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 14px; padding: 10px 12px; }

  .actions{ display:flex; gap:10px; margin-top: 14px; flex-wrap: wrap; align-items:center; }
  button{ font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 14px; border-radius: 7px; padding: 11px 18px; border: 1px solid transparent; cursor: pointer; transition: transform .08s ease; }
  .btn-primary{ background: var(--amber); color: #1A1300; }
  .btn-ghost{ background: transparent; border-color: var(--line); color: var(--text); }
  .btn-small{ padding: 7px 11px; font-size: 12px; }

  /* ---- Appbar & Tabs ---- */
  .appbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 20px; }
  .apptabs{ display:flex; gap:6px; margin-bottom: 18px; }
  .apptabs button{ background: var(--panel); border:1px solid var(--line); color:var(--text-dim); padding: 9px 14px; font-size:13px; border-radius:7px; flex:1; }
  .apptabs button.active{ border-color: var(--amber); color: var(--amber); }

  /* ---- Grid & Cards ---- */
  .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .card{ background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 12px; display:flex; flex-direction: column; gap: 8px; }
  .card.priority{ border-left: 4px solid var(--amber); }
  
  .card-top{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .num{ font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text); }
  .num small{ display:block; color: var(--text-dim); font-size: 11px; }

  .name-row{ display:flex; align-items:center; gap:6px; }
  .name-row label{ font-size: 10px; color: var(--text-dim); flex-shrink:0; }
  .name-input{ flex:1; background: var(--bg); border: 1px solid var(--line); border-radius: 5px; color: var(--text); font-size: 13px; padding: 6px 8px; }

  .card-actions{ display:flex; gap:5px; }
  .icon-btn{ background: transparent; border: 1px solid var(--line); color: var(--text-dim); font-size: 11.5px; padding: 7px 8px; border-radius: 6px; }
  .icon-btn.go{ color: var(--whats); border-color: rgba(61,220,132,0.35); }
  .icon-btn.site{ color: var(--site); border-color: rgba(111,183,255,0.35); }

  .status-select{ background: var(--bg); border:1px solid var(--line); border-radius:5px; color: var(--text); font-size:11px; padding:5px 6px; width:100%; }
  .status-select.st-novo{ color: var(--text-dim); }
  .status-select.st-contatado{ color: var(--amber); font-weight: 700; }

  .lists-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .list-card{ background: var(--panel-2); border: 1px solid var(--line); border-radius: 9px; padding: 14px; display:flex; flex-direction:column; gap:5px; }
  
  .empty{ color: var(--text-dim); font-size: 13px; text-align: center; padding: 24px 10px; border: 1px dashed var(--line); border-radius: 8px; }
  footer{ color: #5C666D; font-size: 11px; text-align:center; margin-top: 40px; }

  @media (max-width: 520px){
    .grid, .lists-grid{ grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- ============ AUTH VIEW ============ -->
  <div id="authView">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="#1A1300"/><path d="M8 10.5C8 9.67 8.67 9 9.5 9C10.33 9 11 9.67 11 10.5C11 11.33 10.33 12 9.5 12C8.67 12 8 11.33 8 10.5Z" fill="#FFB627"/><path d="M13 10.5C13 9.67 13.67 9 14.5 9C15.33 9 16 9.67 16 10.5C16 11.33 15.33 12 14.5 12C13.67 12 13 11.33 13 10.5Z" fill="#FFB627"/></svg>
      </div>
      <div class="logo-wordmark"><span>Disca Zap</span><span>prospecção via WhatsApp</span></div>
    </div>
    <h1>Cole a lista inteira.<br>Sai um <span>link clicável</span> com nome e tudo.</h1>
    <div class="panel">
      <div id="loginForm">
        <div class="field"><label>E-mail</label><input id="loginEmail" type="email" placeholder="seu@email.com"></div>
        <div class="field"><label>Senha</label><input id="loginPass" type="password" placeholder="sua senha"></div>
        <button class="btn-primary" id="loginBtn" style="width:100%; margin-top:10px;">Entrar</button>
        <p id="loginError" style="color:var(--bad); font-size:12px; margin-top:10px;"></p>
      </div>
    </div>
  </div>

  <!-- ============ APP VIEW ============ -->
  <div id="appView" class="hidden">
    <div class="appbar">
      <div class="logo" style="margin-bottom:0;">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="#1A1300"/><path d="M8 10.5C8 9.67 8.67 9 9.5 9C10.33 9 11 9.67 11 10.5C11 11.33 10.33 12 9.5 12C8.67 12 8 11.33 8 10.5Z" fill="#FFB627"/><path d="M13 10.5C13 9.67 13.67 9 14.5 9C15.33 9 16 9.67 16 10.5C16 11.33 15.33 12 14.5 12C13.67 12 13 11.33 13 10.5Z" fill="#FFB627"/></svg>
        </div>
        <div class="logo-wordmark"><span>Disca Zap</span><span id="whoName"></span></div>
      </div>
      <button class="btn-ghost btn-small" id="logoutBtn">Sair</button>
    </div>

    <div class="apptabs">
      <button id="tabNewBtn" class="active">Gerar novos links</button>
      <button id="tabListsBtn">Minhas listas salvas</button>
      <button id="tabTrashBtn">Lixeira</button>
    </div>

    <!-- Tab 1: Generator -->
    <div id="newView">
      <div class="panel">
        <textarea id="input" placeholder="Cole aqui os contatos..."></textarea>
        
        <div id="dropZone" class="drop-zone">
          <span>📄</span>
          Arraste um arquivo CSV ou Excel aqui, ou <b>clique para selecionar</b>.
          <input type="file" id="fileImport" class="hidden" accept=".csv,.txt,.xlsx">
        </div>

        <div class="row">
          <div class="field" style="flex:0 0 100px;"><label>DDI</label><input id="ddi" type="text" value="55"></div>
          <div class="field"><label>Mensagem</label><input id="msg" type="text" placeholder="Olá {nome}..."></div>
        </div>
        <div class="actions"><button class="btn-primary" id="gerar">Gerar links</button></div>
      </div>
      <div id="resultPanel" class="hidden">
        <div id="grid" class="grid"></div>
        <div class="save-row" style="margin-top:20px; display:flex; gap:10px;">
            <input id="newListName" type="text" placeholder="Nome da lista para salvar" style="flex:1; background: var(--bg); border: 1px solid var(--line); border-radius: 6px; color: var(--text); padding: 10px;">
            <button class="btn-primary" id="saveListBtn">Salvar lista</button>
        </div>
      </div>
    </div>

    <!-- Tab 2: Lists -->
    <div id="listsView" class="hidden">
      <div id="listsGrid" class="lists-grid"></div>
      <div id="openedListPanel" class="panel hidden" style="margin-top:20px;">
        <div class="panel-title"><span id="openedListName"></span><button class="btn-ghost btn-small" id="closeListBtn">Fechar</button></div>
        <div id="listContactsGrid" class="grid"></div>
        <button class="btn-ghost" id="deleteListBtn" style="color:var(--bad); margin-top:20px;">Mover para Lixeira</button>
      </div>
    </div>

    <!-- Tab 3: Trash -->
    <div id="trashView" class="hidden">
      <div id="trashGrid" class="lists-grid"></div>
    </div>

  </div>
  <footer>Disca Zap — 2024</footer>
</div>

<script>
const SUPABASE_URL = 'https://rwalkwttbgalqrdbmsys.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3YWxrd3R0YmdhbHFyZGJtc3lzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNDU4ODQsImV4cCI6MjA5NzcyMTg4NH0.Wg9tasyHafBX8r4dQobgq8h5L4ZJmXbfsUv2FU3gaFU';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);

/* ---- Lógica de Dispositivo & Link ---- */
function buildLink(digits, msg){
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  const text = msg ? `&text=${encodeURIComponent(msg)}` : '';
  return isMobile ? `https://api.whatsapp.com/send?phone=${digits}${text}` : `https://web.whatsapp.com/send?phone=${digits}${text}`;
}

/* ---- Lógica de Priorização (Site) ---- */
function detectSite(fields){
  for(const f of fields){
    if((f.includes('http') || f.includes('.com') || f.includes('.br')) && !f.includes('instagram.com')){
        return f.startsWith('http') ? f : 'https://' + f;
    }
  }
  return null;
}

/* ---- Renderização de Cards ---- */
function renderGrid(records, gridEl, prefix, isSaved = false){
  gridEl.innerHTML = '';
  records.forEach((p, idx) => {
    const card = document.createElement('div');
    card.className = 'card' + (p.priority ? ' priority' : '');
    const nameId = `${prefix}-name-${idx}`;
    const statusId = `${prefix}-status-${idx}`;
    const siteBtn = p.site ? `<button class="icon-btn site" onclick="window.open('${p.site}', '_blank')">site 🌐</button>` : '';

    card.innerHTML = `
      <div class="card-top">
        <div class="num">${p.digits || p.original}<small>${p.email || ''}</small></div>
        <div class="card-actions">${siteBtn}<button class="icon-btn go" onclick="openZap('${p.digits}', '${nameId}', '${prefix}')">abrir ↗</button></div>
      </div>
      <div class="name-row"><label>nome:</label><input id="${nameId}" class="name-input" value="${p.name || ''}"></div>
      <select id="${statusId}" class="status-select st-${p.status || 'novo'}" onchange="this.className='status-select st-'+this.value">
        <option value="novo" ${p.status==='novo'?'selected':''}>⚪ Novo</option>
        <option value="contatado" ${p.status==='contatado'?'selected':''}>🟡 Contatado</option>
        <option value="respondeu" ${p.status==='respondeu'?'selected':''}>🟢 Respondeu</option>
      </select>
    `;
    gridEl.appendChild(card);
  });
}

window.openZap = (digits, nameInputId, prefix) => {
    const name = $(nameInputId).value;
    const template = prefix === 'new' ? $('msg').value : '';
    const msg = template.replace(/{nome}/gi, name);
    const sel = $(nameInputId.replace('-name-', '-status-'));
    if(sel && sel.value === 'novo'){ sel.value = 'contatado'; sel.className = 'status-select st-contatado'; }
    window.open(buildLink(digits, msg), 'whatsapp_window');
};

/* ---- Lógica de Processamento ---- */
$('gerar').addEventListener('click', () => {
  const raw = $('input').value.split('\n').filter(l => l.trim());
  const ddi = $('ddi').value;
  let records = raw.map(line => {
    const fields = line.split(/[,;\t]/).map(f => f.trim());
    let digits = fields.find(f => /^\d{8,15}$/.test(f.replace(/\D/g,'')))?.replace(/\D/g,'') || '';
    if(digits && digits.length <= 11) digits = ddi + digits;
    const site = detectSite(fields);
    return { original: line, digits, name: fields.find(f => /[a-zA-Z]{3,}/.test(f) && !f.includes('@') && !f.includes('.')), email: fields.find(f => f.includes('@')), site, priority: !site ? 1 : 0, valid: digits.length >= 10 };
  });
  records.sort((a,b) => b.priority - a.priority);
  $('resultPanel').classList.remove('hidden');
  renderGrid(records, $('grid'), 'new');
  window.currentRecords = records;
});

/* ---- Drop Zone Logic ---- */
const dropZone = $('dropZone');
dropZone.addEventListener('click', () => $('fileImport').click());
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = () => { $('input').value += '\n' + reader.result; };
    reader.readAsText(file);
  }
});
$('fileImport').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = () => { $('input').value += '\n' + reader.result; };
    reader.readAsText(file);
  }
});

/* ---- Supabase & Tabs ---- */
let trashIds = JSON.parse(localStorage.getItem('disca_trash') || '[]');

async function loadLists(){
    const { data } = await sb.from('lists').select('*, contacts(count)');
    const active = (data || []).filter(l => !trashIds.includes(l.id));
    const grid = $('listsGrid');
    grid.innerHTML = active.length ? '' : '<div class="empty">Nenhuma lista.</div>';
    active.forEach(l => {
        const div = document.createElement('div'); div.className = 'list-card';
        div.innerHTML = `<b>${l.name}</b><small>${l.contacts[0].count} contatos</small><button class="btn-primary btn-small" onclick="openList('${l.id}')">Abrir</button>`;
        grid.appendChild(div);
    });
}

window.openList = async (id) => {
    const { data: list } = await sb.from('lists').select('*').eq('id', id).single();
    const { data: contacts } = await sb.from('contacts').select('*').eq('list_id', id);
    $('openedListName').textContent = list.name;
    $('openedListPanel').classList.remove('hidden');
    window.currentListId = id;
    const mapped = contacts.map(c => ({ ...c, site: detectSite([c.extra, c.email]) || (c.extra && c.extra.includes('.') ? c.extra : null) }));
    renderGrid(mapped, $('listContactsGrid'), 'saved', true);
};

$('tabListsBtn').addEventListener('click', () => { switchTab('lists'); loadLists(); });
$('tabNewBtn').addEventListener('click', () => switchTab('new'));
$('tabTrashBtn').addEventListener('click', async () => {
    switchTab('trash');
    const { data } = await sb.from('lists').select('*');
    const trashed = (data || []).filter(l => trashIds.includes(l.id));
    const grid = $('trashGrid'); grid.innerHTML = trashed.length ? '' : '<div class="empty">Lixeira vazia.</div>';
    trashed.forEach(l => {
        const div = document.createElement('div'); div.className = 'list-card'; div.style.opacity = '0.6';
        div.innerHTML = `<b>${l.name}</b><button class="btn-ghost btn-small" onclick="restore('${l.id}')">Restaurar</button>`;
        grid.appendChild(div);
    });
});

function switchTab(tab){
    $('tabNewBtn').classList.toggle('active', tab==='new');
    $('tabListsBtn').classList.toggle('active', tab==='lists');
    $('tabTrashBtn').classList.toggle('active', tab==='trash');
    $('newView').classList.toggle('hidden', tab!=='new');
    $('listsView').classList.toggle('hidden', tab!=='lists');
    $('trashView').classList.toggle('hidden', tab!=='trash');
}

window.restore = (id) => { trashIds = trashIds.filter(tid => tid !== id); localStorage.setItem('disca_trash', JSON.stringify(trashIds)); $('tabTrashBtn').click(); };

$('loginBtn').addEventListener('click', async () => {
    const { data, error } = await sb.auth.signInWithPassword({ email: $('loginEmail').value, password: $('loginPass').value });
    if(!error){ $('authView').classList.add('hidden'); $('appView').classList.remove('hidden'); loadLists(); }
});
$('logoutBtn').addEventListener('click', () => location.reload());

$('saveListBtn').addEventListener('click', async () => {
    const name = $('newListName').value.trim();
    if(!name) return;
    const { data: list } = await sb.from('lists').insert({ name, template: $('msg').value }).select().single();
    const rows = window.currentRecords.filter(r => r.valid).map(r => ({ list_id: list.id, name: r.name || '', digits: r.digits, email: r.email || '', extra: r.site || '', status: 'novo' }));
    await sb.from('contacts').insert(rows);
    alert('Salvo!'); $('newListName').value = ''; loadLists();
});

</script>
</body>
</html>
